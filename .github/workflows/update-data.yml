name: Update MTI data

on:
  schedule:
    # 13:15 UTC daily — GDELT publishes the previous day's file ~06:00 ET (10-11 UTC)
    - cron: "15 13 * * *"
  workflow_dispatch: {}   # manual trigger (use this for the initial backfill)

concurrency:
  group: update-mti-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 300   # generous so the one-time backfill can finish

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install pandas requests pyarrow

      - name: Fetch new GDELT days and rebuild index
        run: python update_data.py

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "data: update $(date -u +%Y-%m-%d)"
            git push
          fi
